<!DOCTYPE html>
<html lang="en">
<head>

    <title>Ecommere-dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/utils.css">
    <link rel="stylesheet" href="css/mobile.css">
    <link rel="stylesheet" href="css/items.css">
</head>
<body>

   


    <header class="">

        <div class="sidebar sidebarGo">
                <ul>
                    <li> <a href="/">Kids</a> </li>
                    <li> <a href="/">Men</a> </li>
                    <li> <a href="/">Women</a> 
                    <li> <a href="/">Deals</a> </li>
                    <li> <a href="/">Orders</a> </li>
                    <li> <a href="/">Account Info</a> </li>
                    <li> <a href="/">Contact Us</a> </li>
                </ul>
        </div>
        
        <nav class="flex space-between container-header">
            <div class="hamburger">
                <img class="ham" src="icons/ham.svg"  alt="">
                <img class="cross" src="icons/close.png"  alt="">
            </div>
            <div class="left flex items-center  uppercase semibold">
                <div class="logo font1"> <a href="#" class="link">Ecommerce Dashboard</a> </div>
                <ul class="flex mv-1 ">
                    <li> <a href="#" class="link">Categories</a> </li>
                    <li><a href="#" class="link">Brands</a></li>
                    <li><a href="#" class="link">Deals</a></li>
                    <li><a href="#" class="link">Orders</a></li>
                </ul>
            </div>

            <div class="right flex items-center semibold">

                <input type="text" class="search" placeholder="Search for products, brand and more">

                <div class=" column items-center mx-2">
                    <label for="searchicon">
                    <img src="icons/search.svg" class="icon" alt=""> </label>
                    <a href="#" class="link searchicon"></a> 
                </div>

                <div class="rightbox ">
                    
                    <div class=" column items-center mx-2">
                        <label for="user">
                        <img src="icons/user.svg" class="icon" alt=""> </label>
                        <a href="#" class="link user">Profile</a> 
                    </div>

                    <div class=" column items-center mx-2">
                        <label for="heart">
                        <img src="icons/wishlist.png" class="icon" alt=""> </label>
                        <a href="#" class="link heart ">Wishlist</a>
                    </div>

                    <div class=" column items-center mx-2">
                        <label for="cart">
                        <img src="icons/bag.svg" class="icon" alt=""></label>
                        <a href="#" class="link cart">Bag</a>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <section class="container flex">

    </section> 



    <footer class="">

    </footer>
